# Font
font_family JetBrainsMono Nerd Font Mono
font_size 12.0
bold_font auto
italic_font auto
bold_italic_font auto

# Use Neovim anywhere kitty needs to open files.
editor nvim

# Track the active shell state so new tabs can inherit the current directory.
shell_integration enabled
allow_remote_control yes

# Keep interactive scrollback reasonable, and keep much more history for pager views.
scrollback_lines 10000
scrollback_pager_history_size 256
notify_on_cmd_finish invisible 8.0
confirm_os_window_close -1

# Minimal chrome and spacing.
hide_window_decorations titlebar-only
window_margin_width 6
window_padding_width 3 6 6
placement_strategy center
cursor_shape beam

# Preserve one Option key for shell/editor Alt bindings on macOS.
macos_option_as_alt right
macos_show_window_title_in menubar

# New tabs should start in the active tab's current working directory.
map ctrl+shift+t new_tab_with_cwd
map cmd+t new_tab_with_cwd
map cmd+enter new_window_with_cwd
map cmd+d combine : goto_layout splits : launch --cwd=current --location=vsplit
map cmd+shift+[ previous_window
map cmd+shift+] next_window
map cmd+1 goto_tab 1
map cmd+2 goto_tab 2
map cmd+3 goto_tab 3
map cmd+4 goto_tab 4
map cmd+5 goto_tab 5
map cmd+6 goto_tab 6
map cmd+7 goto_tab 7
map cmd+8 goto_tab 8
map cmd+9 goto_tab 9

# Fast hints access for common engineering workflows.
action_alias hints_url open_url_with_hints
action_alias hints_path kitten hints --type=path
action_alias hints_line kitten hints --type=linenum --linenum-action=self nvim +{line} {path}
action_alias hints_hash kitten hints --type=hash --program -
map cmd+shift+e hints_url
map cmd+shift+f hints_path
map cmd+shift+g hints_line
map cmd+shift+h hints_hash

# Keep default URL detection and click behavior explicit.
detect_urls yes
open_url_with default

# Disable all bell-related sound and attention behavior.
enable_audio_bell no
visual_bell_duration 0.0
window_alert_on_bell no
bell_on_tab none
command_on_bell none
bell_path none

