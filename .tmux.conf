########################################
# Tmux Configuration
# 
# Plugins:
#   - tmux-plugins/tpm           : Tmux Plugin Manager
#   - tmux-plugins/tmux-sensible : Sensible defaults for tmux
#   - tmux-plugins/tmux-yank     : System clipboard integration
#
# Prefix:
#   - Default "C-b" is unbound
#   - New prefix: ` (backtick)
#   - ` + ` → toggle to last window
#   - ` + e → send prefix (useful for nested tmux)
#
# Navigation:
#   - ` + h/j/k/l → move left/down/up/right
#
# Resizing Panes:
#   - ` + H/J/K/L → resize 10 units
#   - ` + C-h/j/k/l → resize 50 units
#
# Splits & Windows:
#   - ` + c        → new window (same dir)
#   - ` + "        → vertical split (top/bottom, same dir)
#   - ` + %        → horizontal split (left/right, same dir)
#   - ` + J        → join another window as LEFT/RIGHT split
#   - ` + !        → break current pane into its own window (default tmux binding)
#   - ` + S        → swap current window with target window
#   - ` + TAB      → swap positions for window splits
#
# Copy Mode (vi):
#   - v     → begin selection
#   - C-v   → rectangle toggle
#   - y     → yank + exit
#
# Clearing:
#   - ` + C → clear visible screen and tmux scrollback
#
# Useful Defaults (tmux built-ins):
#   - ` + n / p → next / previous window
#   - ` + ,     → rename current window
#   - ` + &     → kill current window
#   - ` + x     → kill current pane
#   - ` + o     → go to next pane
#   - ` + q     → show pane numbers
#   - ` + space → cycle through layouts (tiled, even-vertical, even-horizontal, etc.)
########################################

# --- Plugins ---
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
run '~/.tmux/plugins/tpm/tpm'

# --- Prefix ---
unbind C-b
set -g prefix `
bind-key ` last-window
bind-key e send-prefix

# --- Pane Navigation ---
bind -r k select-pane -U
bind -r j select-pane -D
bind -r h select-pane -L
bind -r l select-pane -R

# --- Pane Resizing ---
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5
bind -r C-h resize-pane -L 50
bind -r C-j resize-pane -D 50
bind -r C-k resize-pane -U 50
bind -r C-l resize-pane -R 50

# --- Clear Buffer ---
bind C send-keys C-l \; clear-history

# --- Copy Mode (vi) ---
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# --- Window Management ---
bind-key S command-prompt -p "Swap current window with window #:" "swap-window -t '%%'"
bind J command-prompt -p "Join from window # (e.g. 3 or 3.0):" "join-pane -h -s ':%%'"
bind-key c new-window -a -c "#{pane_current_path}"

# Break active pane into a new window inserted AFTER the current window
bind-key '!' break-pane -d -a -t:.

# (cwd inheritance for new windows/splits provided by tmux-sensible)
bind c new-window -a -c "#{pane_current_path}"
#
bind '"' split-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# --- Status Bar ---
set -g status-bg colour234
set -g status-fg colour137
# set -g status-left ''
# set -g status-right '#[fg=colour233,bg=colour241,bold] %d/%m #[fg=colour233,bg=colour245,bold] %H:%M:%S '
set -g status-right ''
# set -g status-right-length 50
# set -g status-left-length 20
setw -g window-status-current-format ' #I#[fg=colour250]:#[fg=colour255]#W#[fg=colour50]#F '
setw -g window-status-format ' #I#[fg=colour237]:#[fg=colour250]#W#[fg=colour244]#F'

# --- Terminal Colors (optional) ---
# set -g default-terminal "tmux-256color"
# set -ag terminal-overrides ",xterm-256color:RGB"

# Swap current pane with the next one (good for 2-pane windows)
bind Tab swap-pane -D

setw -g mode-keys vi      # vi keys in copy-mode
set  -g status-keys vi    # vi keys in prompts (incl. / search prompt)
set -g mouse on

set-option -g renumber-windows on
